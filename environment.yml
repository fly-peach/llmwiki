# LLM Wiki Conda 环境配置
# 使用方式: conda env create -f environment.yml
# 更新:     conda env update -f environment.yml
name: llmwiki
channels:
  - conda-forge
  - defaults
dependencies:
  # --- Python 版本 ---
  - python>=3.12,<3.13

  # --- API 依赖 ---
  - fastapi==0.136.1
  - starlette==1.3.1
  - idna>=3.15
  - uvicorn==0.46.0
  - httpx==0.28.1
  - pydantic==2.13.4
  - pydantic-settings==2.14.2
  - python-multipart==0.0.31
  - pyyaml==6.0.3
  - openpyxl==3.1.5
  - beautifulsoup4==4.13.4
  - lxml==6.1.0
  - aiosqlite==0.22.1
  - watchfiles==1.1.0
  - aiohttp==3.14.1
  - cryptography==48.0.1
  - requests==2.33.1
  - urllib3==2.7.0

  # --- MCP 依赖 ---
  - typer>=0.16.0
  - sse-starlette>=1.6.1
  - httpx-sse>=0.4.0
  - jsonschema>=4.20.0
  - pyjwt>=2.10.1
  - pywin32>=310          # [win]

  # --- pip 安装的包 (conda-forge 不可用或版本滞后的) ---
  - pip
  - pip:
      - opendataloader-pdf==2.3.0
      - mcp[cli]==1.27.0

  # --- 测试依赖 (可选) ---
  # 运行测试时取消下面注释:
  # - pytest==9.0.3
  # - pytest-asyncio==1.3.0
  # - pygments==2.20.0
